<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — Yashaswi Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Inter',sans-serif;}

body {
  background: #050510;
  color: #e8e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* Particle canvas */
#canvas {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}

/* Grid lines background */
.grid-bg {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Glow orbs */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none; z-index: 0;
}
.orb1 { width:400px;height:400px; background:rgba(0,245,196,0.07); top:-100px; left:-100px; animation: orbFloat 8s ease-in-out infinite; }
.orb2 { width:300px;height:300px; background:rgba(124,58,237,0.08); bottom:-80px; right:-80px; animation: orbFloat 10s ease-in-out infinite reverse; }
@keyframes orbFloat {
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(30px,30px);}
}

/* Login card */
.login-wrap {
  position: relative; z-index: 10;
  width: 100%; max-width: 420px;
  padding: 1rem;
}

.login-card {
  background: rgba(10,10,26,0.85);
  border: 1px solid rgba(0,245,196,0.18);
  border-radius: 20px;
  padding: 2.5rem 2.5rem 2rem;
  backdrop-filter: blur(24px);
  box-shadow: 0 0 60px rgba(0,245,196,0.08), 0 30px 80px rgba(0,0,0,0.5);
  animation: cardIn 0.7s cubic-bezier(0.23,1,0.32,1) both;
}
@keyframes cardIn {
  from{opacity:0;transform:translateY(30px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* Header */
.login-header { text-align: center; margin-bottom: 2rem; }
.login-logo {
  display: inline-flex; align-items: center; justify-content: center;
  width: 60px; height: 60px; border-radius: 16px;
  background: linear-gradient(135deg, #00f5c4, #7c3aed);
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem; font-weight: 800;
  color: #050510;
  margin-bottom: 1.25rem;
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100%{box-shadow:0 0 20px rgba(0,245,196,0.3);}
  50%{box-shadow:0 0 40px rgba(0,245,196,0.6), 0 0 60px rgba(124,58,237,0.3);}
}
.login-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem; font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 0.3rem;
}
.login-title span { color: #00f5c4; }
.login-subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; color: #666688;
  letter-spacing: 0.15em; text-transform: uppercase;
}

/* Error message */
.login-error {
  background: rgba(255,0,80,0.08);
  border: 1px solid rgba(255,0,80,0.25);
  border-radius: 10px;
  padding: 0.75rem 1rem;
  margin-bottom: 1.25rem;
  font-size: 0.8rem; color: #ff4466;
  font-family: 'Space Mono', monospace;
  display: flex; align-items: center; gap: 0.5rem;
}
.login-error::before { content: '⚠'; }

/* Form */
.form-group {
  display: flex; flex-direction: column; gap: 0.4rem;
  margin-bottom: 1.1rem;
}
.form-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem; color: #8888aa;
  text-transform: uppercase; letter-spacing: 0.15em;
}
.input-wrap {
  position: relative;
}
.input-icon {
  position: absolute; left: 0.85rem; top: 50%;
  transform: translateY(-50%);
  font-size: 0.9rem; color: #444466;
  transition: color 0.3s; pointer-events: none;
}
.form-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 0.8rem 1rem 0.8rem 2.5rem;
  color: #e8e8f0;
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
}
.form-input:focus {
  border-color: #00f5c4;
  background: rgba(0,245,196,0.04);
  box-shadow: 0 0 0 3px rgba(0,245,196,0.1);
}
.form-input:focus + .input-icon,
.input-wrap:focus-within .input-icon { color: #00f5c4; }
/* Reorder so icon is after input for sibling selector */
.input-wrap { display: flex; flex-direction: column; position: relative; }
.form-input { order: 1; }
.input-icon { order: 0; position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); }

/* Submit */
.btn-login {
  width: 100%; margin-top: 0.5rem;
  background: linear-gradient(135deg, #00f5c4, #00c49a);
  color: #050510;
  border: none; border-radius: 10px;
  padding: 0.9rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  position: relative; overflow: hidden;
}
.btn-login::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%);
  transition: transform 0.4s;
}
.btn-login:hover::before { transform: translateX(0); }
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,245,196,0.35); }
.btn-login:active { transform: translateY(0); }

/* Footer hint */
.login-footer {
  text-align: center; margin-top: 1.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; color: #444466;
  letter-spacing: 0.1em;
}
.login-footer a {
  color: #00f5c4; text-decoration: none;
}
.login-footer a:hover { text-decoration: underline; }

/* Divider */
.divider {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 1.25rem 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(255,255,255,0.06);
}
.divider span {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; color: #444466;
  letter-spacing: 0.1em; text-transform: uppercase;
}

/* Back link */
.back-link {
  display: flex; align-items: center; justify-content: center;
  gap: 0.4rem; margin-top: 1rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; color: #555577;
  text-decoration: none; letter-spacing: 0.08em;
  transition: color 0.3s;
}
.back-link:hover { color: #00f5c4; }

/* Scanning line animation on card */
.login-card::after {
  content: '';
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0,245,196,0.4), transparent);
  top: 0; border-radius: 20px 20px 0 0;
  animation: scanLine 3s ease-in-out infinite;
}
.login-card { position: relative; overflow: hidden; }
@keyframes scanLine {
  0%   { top: 0; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">NY</div>
      <h1 class="login-title">Portfolio <span>Admin</span></h1>
      <p class="login-subtitle">Secure Access Only</p>
    </div>

    {% if form.errors %}
    <div class="login-error">
      Invalid username or password. Try again.
    </div>
    {% endif %}

    {% if form.non_field_errors %}
    <div class="login-error">{{ form.non_field_errors }}</div>
    {% endif %}

    <form method="post" action="{% url 'admin:index' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div class="form-group">
        <label class="form-label" for="id_username">Username</label>
        <div class="input-wrap">
          <input
            type="text"
            name="username"
            id="id_username"
            class="form-input"
            placeholder="admin"
            autocomplete="username"
            autofocus
            required
          >
          <span class="input-icon">👤</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="id_password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            name="password"
            id="id_password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <span class="input-icon">🔒</span>
        </div>
      </div>

      <button type="submit" class="btn-login">
        → Access Dashboard
      </button>
    </form>

    <div class="divider"><span>or</span></div>
    <a href="/" class="back-link">← Back to Portfolio</a>
  </div>

  <p class="login-footer" style="margin-top:1.25rem;">
    Powered by <span style="color:#00f5c4">Django</span> · {{ request.META.SERVER_NAME }}
  </p>
</div>

<script>
// Particle background
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, pts = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 80; i++) {
  pts.push({
    x: Math.random() * 1920, y: Math.random() * 1080,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    r: Math.random() * 1.2 + 0.3,
    o: Math.random() * 0.4 + 0.1,
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  pts.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,245,196,${p.o})`;
    ctx.fill();
  });
  // Lines
  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 120) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(0,245,196,${0.05 * (1 - d/120)})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
